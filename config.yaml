# Operation TEMPEST-NEUTRAL — non-secret runtime config. Secrets come from env (.env), never here.
# CONSERVATIVE DOLLAR-NEUTRAL PAPER desk: ~3%/MONTH, -15% drawdown limit, single 4h loop.
account_size_usdt: 10000.0
timeframe: "4h"            # regime ANCHOR timeframe (authoritative regime read is taken on 4h)
symbol_count: 12
deep_model: "opus"
quick_model: "haiku"
verdict_horizon_months: 2
target_monthly: 0.03       # ~3%/month mandate (drives the pacing engine)
max_drawdown_tolerance: 0.15  # -15% hard force-flatten breaker
# Single 4h strategic loop. The `fast` entry is kept INERT (never scheduled — run_loops.py is
# strategic-only) so the protected run_exit_sweep machinery + its tests stay intact.
loops:
  fast:
    timeframe: "15m"
    quick_model: "haiku"
    deep_model: "sonnet"
    poll_minutes: 5
  strategic:
    timeframe: "4h"
    regime_timeframe: "4h"
    quick_model: "sonnet"
    deep_model: "opus"
    poll_minutes: 5
# Per-AGENT model (resolved at dispatch; overrides the loop tier). RULE: every agent that DECIDES
# money runs on OPUS; only operational agents (narrating deterministic logic) run cheaper. The
# single 4h loop dispatches momentum/carry/news -> CIO -> Trader; the Scalper is RETIRED (no fast loop).
agent_models:
  cio: "opus"
  trader: "opus"
  momentum: "opus"
  carry: "opus"
  news: "opus"
  sentiment: "opus"
  reflector: "opus"
  pace_officer: "sonnet"
# live: false => PAPER, FOREVER for this desk. Real mainnet market data (public, keyless), simulated
# execution with realistic fees/funding/slippage/liquidation. The universe is selected dynamically
# each cycle; `symbols` is only a cold-start fallback. Never flip live to true.
live: false
exchange:
  testnet: false
  key_env: "BINANCE_KEY"
  secret_env: "BINANCE_SECRET"
data:
  news_rss_sources:
    - "https://www.coindesk.com/arc/outboundfeeds/rss/?outputType=xml"
    - "https://cointelegraph.com/rss"
  fred_key_env: "FRED_API_KEY"
  fred_series: ["DTWEXBGS", "DGS10", "FEDFUNDS", "CPIAUCSL"]
  archive_dir: "state/archive"
